<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег Яры от Гусей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #4ade80; /* Цвет травы */
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            touch-action: none; /* Запрет скролла на мобильных */
            user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud {
            pointer-events: auto;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }
        .hidden { display: none !important; }
        
        .btn {
            background: #f59e0b;
            color: white;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 9999px;
            border: 4px solid #b45309;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            width: 90%;
            max-width: 400px;
        }
        .shop-item {
            background: #fff;
            border: 3px solid #333;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            color: #000;
        }
        .shop-item img { height: 50px; }
        .buy-btn {
            background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 5px; width: 100%; margin-top: 5px; font-weight: bold;
        }
        .buy-btn:disabled { background: #9ca3af; }
    </style>
</head>
<body>

    <!-- Игровой холст -->
    <canvas id="gameCanvas"></canvas>

    <!-- Игровой интерфейс (HUD) -->
    <div id="hud" class="ui-layer hidden">
        <div class="hud text-white font-bold text-2xl">
            <div>Уровень: <span id="uiLevel" class="text-yellow-300">1</span></div>
            <div>🥃 <span id="uiBottles">0</span></div>
        </div>
        
        <!-- Чат лог -->
        <div id="chatLog" style="position: absolute; top: 60px; left: 10px; width: 220px; transform: scale(0.65); transform-origin: top left; z-index: 50; pointer-events: none; display: flex; flex-direction: column; gap: 4px;">
        </div>
        
        <!-- Джойстик -->
        <div id="joystick-zone" style="position: absolute; bottom: 30px; right: 30px; width: 120px; height: 120px; background: rgba(0,0,0,0.3); border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); z-index: 60; touch-action: none; pointer-events: auto;">
            <div id="joystick-knob" style="position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3);"></div>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="mainMenu" class="menu-screen">
        <h1 class="text-5xl font-bold text-white mb-8 text-center" style="text-shadow: 3px 3px 0 #000;">Побег Яры</h1>
        <p class="text-white text-center mb-6 max-w-xs">Собирай 🥃, убегай от 🦢.<br>Осторожно: чем больше выпьешь, тем сложнее бежать!</p>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn bg-blue-500 border-blue-700" onclick="openShop()">МАГАЗИН</button>
        <div class="text-white mt-4 font-bold text-xl">Твой запас 🥃: <span id="menuBottles">0</span></div>
    </div>

    <!-- Экран Магазина -->
    <div id="shopScreen" class="menu-screen hidden">
        <h2 class="text-4xl font-bold text-white mb-4">Магазин Улучшений</h2>
        <div class="text-yellow-300 font-bold text-xl mb-4">Баланс: <span id="shopBottles">0</span> 🥃</div>
        <div class="shop-grid" id="shopContainer">
            <!-- Товары генерируются JS -->
        </div>
        <button class="btn bg-red-500 border-red-700 mt-6" onclick="closeShop()">НАЗАД</button>
    </div>

    <!-- Экран проигрыша -->
    <div id="gameOverScreen" class="menu-screen hidden">
        <h2 class="text-5xl font-bold text-red-500 mb-4" style="text-shadow: 2px 2px 0 #000;">ПОЙМАЛИ!</h2>
        <p class="text-white text-2xl mb-6">Гусь оказался быстрее...</p>
        <p class="text-yellow-300 text-xl mb-6">Собрано за раунд: <span id="roundBottles">0</span> 🥃</p>
        <button class="btn" onclick="startGame()">ИГРАТЬ СНОВА</button>
        <button class="btn bg-blue-500 border-blue-700" onclick="openShopFromGameOver()">В МАГАЗИН</button>
    </div>

<script>
    // --- НАСТРОЙКИ ФОТО ---
    const HEAD_IMAGE_URL = 'face.png'; 
    const headImg = new Image();
    headImg.src = HEAD_IMAGE_URL;

    // --- ФРАЗЫ ---
    const phrasesCollect = [
        "О, ещё бутылочка!", "Какой хороший день!", "Здорово, Вискарик!",
        "Вау, ещё одна!", "Это про запас", "А это на праздник", "Оп оп оп!!!",
        "Моя прелесть!", "Никому не отдам!", "Пятница начинается!"
    ];
    
    const phrasesYaraRandom = [
        "Эх Эля, за что ты так...", "Да я так то ваще не пью", "Я что в игре?",
        "Тёть, Маш, спаси меня!", " ДА чё за бред то?", "Ой, ноготь сломала!",
        "Гуси, вы вообще нормальные?", "До инфаркта недалеко!", "Вызовите мне бизнес-такси!",
        "Я девочка, мне можно!", "Слишком много кардио...", "А где кнопка паузы?!",
        "Мама, забери меня отсюда!", "Я же только один бокальчик хотела...", 
        "Главное — держать спину прямо!", " Что бы на моём месте сделал Сергей Лазарев?",
        "Кто придумал эти правила?!", "Я сейчас буду ругаться матом!",
        "У меня лапки! Ой, ручки!", "Вот это вечериночка..."
    ];

    const phrasesScared = ["Ааа, пернатый!", "Кыш, гусь!", "Не щипайся!", "Спасите!", "Я невкусная!"];
    const phrasesGoose = [
        "Яра, отдай виски!", "Га-га-га, Ярослава!", "Стой, Яра, поговорим!",
        "Ярослава, ты слишком много пьёшь!", "От меня не убежишь!", "Шиш тебе, а не праздник!",
        "Верни стеклотару, Яра!","В самое сердце! На пораженье!", "Яра, по нам с тобой написали диплом.", "Что ещё за семейники? вы чё?!",
        "Шшшшшш....", "Я гусь, я тебя кусь-кусь", "Яра, иди чё то покажу", "Подойди как по ближе.",
        "Смотри чё покажу"
    ];

    const gooseNames = ['Вячеслав', 'Иннокентий', 'Константин', 'Евлампий', 'Анатолий', 'Геннадий', 'Валера', 'Игнат', 'Аркадий', 'Степан', 'Борис', 'Леопольд'];
    const phrasesFall = ['упала', 'ой бумкнулась', 'ох вискарик', 'что ты наделал Джек', 'ой чёто я пьяненькая', 'ой', 'упс'];
    const phrasesEggDrop = ['Пошло родимое!', 'Яичко!', 'Оппаньки, смотри чё тут', 'Ох тыж, здоровенное!', 'Оп-ля!', 'Яйка!', 'Опа'];
    const phrasesEggStep = ['Это чё ваще?', 'Это что яичко?', 'Ой, кто потерял яичко?', 'Что за хрень?!', 'Фу!', 'Помогити!', 'Упс!'];
    const weaponPhrases = {
        'knife': ['Порежу на шашлык!', 'Чик-чик и готово!', 'Где моя вилочка?'],
        'pistol': ['Пиф-паф, ой-ой-ой!', 'Руки вверх!', 'Сдавайся, Яра!'],
        'fork': ['Покушаем!', 'Сейчас я тебя отведаю!', 'Аппетит разыгрался!'],
        'rifle': ['Тра-та-та-та!', 'На пролом!', 'Га-га-га-ганстер!'],
        'pitchfork': ['Ат-тя-тя!', 'Иди ка сюда!', 'Щя я тебя вилами то...!!!'],
        'lasso': ['Ловись, рыбка!', 'Арканю!', 'Сюда иди!', 'Ща свяжу!', 'Лассо-бросо!']
    };
    const phrasesLassoHit = ['Ой, связали!', 'БДСМ какой-то!', 'Отпусти, пернатый!', 'Я не корова!', 'Где мой адвокат?!'];

    // --- ИГРОВЫЕ ДАННЫЕ И СОСТОЯНИЯ ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Границы мира
    const WORLD_MIN_X = -2000;
    const WORLD_MAX_X = 2000;
    const WORLD_MIN_Y = -2000;
    const WORLD_MAX_Y = 2000;

    let w, h;
    let gameState = 'menu';
    let globalBottles = parseInt(localStorage.getItem('yara_bottles')) || 0;
    
    // Магазин
    const shopItems = [
        { id: 'dress_blue', name: 'Синее платье', cost: 10, type: 'skin', color: '#3b82f6', desc: 'Просто красиво' },
        { id: 'dress_black', name: 'Кожанка', cost: 25, type: 'skin', color: '#1f2937', desc: 'Стиль рок' },
        { id: 'dress_gold', name: 'Золотой наряд', cost: 100, type: 'skin', color: '#fbbf24', desc: 'Лакшери' },
        { id: 'rollers', name: 'Ролики', cost: 50, type: 'vehicle', speedMod: 1.5, desc: 'Скорость +50%' },
        { id: 'bike', name: 'Велосипед', cost: 150, type: 'vehicle', speedMod: 2.2, desc: 'Скорость +120%' },
        { id: 'magic_wand', name: 'Волш. палочка', cost: 20, type: 'wand', desc: 'Авто-заклинания' }
    ];
    let inventory = JSON.parse(localStorage.getItem('yara_inventory')) || ['dress_red'];
    let equippedSkin = localStorage.getItem('yara_equippedSkin') || 'dress_red';
    let equippedVehicle = localStorage.getItem('yara_equippedVehicle') || 'none';
    let equippedWand = localStorage.getItem('yara_equippedWand') || 'none';

    // Игровые переменные
    let level = 1;
    let bottlesCollectedThisRound = 0;
    let pointer = { x: 0, y: 0 };
    let camera = { x: 0, y: 0 };
    let frameCount = 0;
    const ZOOM = 0.55;

    // Управление
    let joyActive = false;
    let joyData = { x: 0, y: 0 };
    let pointerActive = false;

    // Сущности
    let player;
    let geese = [];
    let items = []; 
    let obstacles = []; 
    let traps = []; 
    let particles = [];
    let bubbles = []; 
    let bullets = []; 
    let grasses = [];
    let stones = [];
    let introTimer = 0;
    let introText = '';

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Вспомогательные функции для заклинаний
    function getNearestGoose(x, y, aliveOnly = true) {
        let nearest = null;
        let minDist = Infinity;
        for (let g of geese) {
            if (aliveOnly && g.isDead) continue;
            let d = Math.hypot(g.x - x, g.y - y);
            if (d < minDist) { minDist = d; nearest = g; }
        }
        return nearest;
    }

    function getNearestItem(x, y) {
        let nearest = null;
        let minDist = Infinity;
        for (let i of items) {
            if (i.isAccio) continue;
            let d = Math.hypot(i.x - x, i.y - y);
            if (d < minDist) { minDist = d; nearest = i; }
        }
        return nearest;
    }

    // --- КЛАССЫ ---

    class Player {
        constructor() {
            this.x = 0;
            this.y = 0;
            this.baseSpeed = 4;
            this.size = 20;
            this.drunkLevel = 0;
            this.vx = 0;
            this.vy = 0;
            this.slowedTimer = 0;
            this.fallenTimer = 0;
            this.legsPhase = 0;
            this.panicTimer = 0;
            this.randomPhraseTimer = 300 + Math.random() * 600;
            this.wandTimer = 1200; // 20 сек
            this.speedBoostTimer = 0;
        }

        update() {
            // Если упала пьяненькая или от яйца/лассо
            if (this.fallenTimer > 0) {
                this.fallenTimer--;
                this.vx *= 0.8;
                this.vy *= 0.8;
                this.x += this.vx;
                this.y += this.vy;
                camera.x = this.x - (w / 2) / ZOOM;
                camera.y = this.y - (h / 2) / ZOOM;
                return;
            }

            if (this.slowedTimer > 0) this.slowedTimer--;

            // Бонус от транспорта и магии
            let currentSpeed = this.baseSpeed;
            if (equippedVehicle === 'rollers') currentSpeed *= 1.5;
            if (equippedVehicle === 'bike') currentSpeed *= 2.2;
            if (this.speedBoostTimer > 0) {
                this.speedBoostTimer--;
                currentSpeed *= 1.8;
            }
            if (this.slowedTimer > 0) currentSpeed *= 0.4;

            // Пьяная физика
            let wobbleX = 0;
            let wobbleY = 0;
            if (this.drunkLevel > 0) {
                let wobbleIntensity = Math.min(this.drunkLevel * 0.4, 6);
                wobbleX = Math.sin(frameCount * 0.05) * wobbleIntensity;
                wobbleY = Math.cos(frameCount * 0.04) * wobbleIntensity;
            }

            // Управление: Джойстик или Палец/Мышь
            let isMoving = false;
            let targetVx = 0;
            let targetVy = 0;

            if (joyActive && (Math.abs(joyData.x) > 0.05 || Math.abs(joyData.y) > 0.05)) {
                targetVx = joyData.x * currentSpeed + wobbleX;
                targetVy = joyData.y * currentSpeed + wobbleY;
                isMoving = true;
            } else if (pointerActive) {
                let targetX = pointer.x + camera.x;
                let targetY = pointer.y + camera.y;
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dist = Math.hypot(dx, dy);

                if (dist > 5) {
                    targetVx = (dx / dist) * currentSpeed + wobbleX;
                    targetVy = (dy / dist) * currentSpeed + wobbleY;
                    isMoving = true;
                }
            }

            if (isMoving) {
                this.vx += (targetVx - this.vx) * 0.15;
                this.vy += (targetVy - this.vy) * 0.15;
            } else {
                this.vx *= 0.8;
                this.vy *= 0.8;
            }

            // Анимация ног
            let speed = Math.hypot(this.vx, this.vy);
            if (speed > 0.5) {
                this.legsPhase += speed * 0.15;
            } else {
                this.legsPhase = 0;
            }

            // Коллизия с препятствиями (водой)
            let nextX = this.x + this.vx;
            let nextY = this.y + this.vy;
            let canMoveX = true;
            let canMoveY = true;

            for (let obs of obstacles) {
                if (obs.type === 'water') {
                    if (Math.hypot(nextX - obs.x, this.y - obs.y) < this.size + obs.size) canMoveX = false;
                    if (Math.hypot(this.x - obs.x, nextY - obs.y) < this.size + obs.size) canMoveY = false;
                }
            }

            if (canMoveX) this.x += this.vx;
            if (canMoveY) this.y += this.vy;

            // Ограничение движения забором
            this.x = Math.max(WORLD_MIN_X + this.size, Math.min(WORLD_MAX_X - this.size, this.x));
            this.y = Math.max(WORLD_MIN_Y + this.size, Math.min(WORLD_MAX_Y - this.size, this.y));

            // Паника
            let nearestGooseDist = Infinity;
            let nearestGoose = null;
            for (let g of geese) {
                if(g.isDead) continue;
                let d = Math.hypot(g.x - this.x, g.y - this.y);
                if (d < nearestGooseDist) {
                    nearestGooseDist = d;
                    nearestGoose = g;
                }
            }

            if (nearestGooseDist < 150) {
                this.panicTimer++;
            } else {
                this.panicTimer = 0;
            }

            // Случайные фразочки Яры
            this.randomPhraseTimer--;
            if (this.randomPhraseTimer <= 0) {
                this.randomPhraseTimer = 400 + Math.random() * 600;
                addBubble(this, phrasesYaraRandom[Math.floor(Math.random() * phrasesYaraRandom.length)], '#ffffff');
            }

            // Магия
            if (equippedWand === 'magic_wand') {
                this.wandTimer--;
                if (this.wandTimer <= 0) {
                    this.wandTimer = 1200; // 20s
                    let spell = Math.floor(Math.random() * 4);
                    if (spell === 0) {
                        this.speedBoostTimer = 300;
                        addBubble(this, "Ускорятус!", '#a855f7');
                    } else if (spell === 1) {
                        let g = getNearestGoose(this.x, this.y);
                        if (g) { g.stunTimer = 180; addBubble(this, "Остолбеней!", '#a855f7'); }
                    } else if (spell === 2) {
                        let itm = getNearestItem(this.x, this.y);
                        if (itm) { itm.isAccio = true; addBubble(this, "Акцио!", '#a855f7'); }
                    } else if (spell === 3) {
                        let g = getNearestGoose(this.x, this.y);
                        if (g) { g.isDead = true; addBubble(this, "Авада Кедавра!", '#22c55e'); }
                    }
                }
            }

            camera.x = this.x - (w / 2) / ZOOM;
            camera.y = this.y - (h / 2) / ZOOM;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x - camera.x, this.y - camera.y);
            
            let angle = Math.atan2(this.vy, this.vx);
            if (Math.hypot(this.vx, this.vy) > 0.5) {
                 ctx.rotate(Math.sin(frameCount * 0.1) * 0.2 * (1 + this.drunkLevel*0.1));
            }
            
            if (this.fallenTimer > 0) {
                ctx.rotate(Math.PI / 2);
            }

            // Отрисовка шеи
            ctx.fillStyle = '#fca5a5';
            ctx.fillRect(-3, -22, 6, 10);

            // Отрисовка ног и ботиночек
            ctx.fillStyle = '#fca5a5';
            let swing = Math.sin(this.legsPhase) * 10;
            
            // Левая
            ctx.beginPath(); ctx.roundRect(-8, 10 + swing, 6, 15, 3); ctx.fill(); 
            if (equippedVehicle === 'none') {
                ctx.fillStyle = '#1f2937';
                ctx.beginPath(); ctx.roundRect(-9, 22 + swing, 8, 5, 2); ctx.fill();
            }
            // Правая
            ctx.fillStyle = '#fca5a5';
            ctx.beginPath(); ctx.roundRect(2, 10 - swing, 6, 15, 3); ctx.fill();  
            if (equippedVehicle === 'none') {
                ctx.fillStyle = '#1f2937';
                ctx.beginPath(); ctx.roundRect(1, 22 - swing, 8, 5, 2); ctx.fill();
            }

            // Отрисовка транспорта
            if (equippedVehicle === 'bike') {
                ctx.fillStyle = '#6b7280';
                ctx.beginPath(); ctx.arc(-15, 10, 10, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(15, 10, 10, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-15,10); ctx.lineTo(0,-10); ctx.lineTo(15,10); ctx.stroke();
            } else if (equippedVehicle === 'rollers') {
                ctx.fillStyle = '#f43f5e';
                ctx.beginPath(); ctx.arc(-8, 15 + swing, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, 15 - swing, 4, 0, Math.PI*2); ctx.fill();
            }

            // Отрисовка платья
            let dressColor = '#ef4444';
            let skinItem = shopItems.find(i => i.id === equippedSkin);
            if (skinItem) dressColor = skinItem.color;

            ctx.fillStyle = dressColor;
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(6, -10);
            ctx.quadraticCurveTo(15, 5, 12, 15);
            ctx.lineTo(-12, 15);
            ctx.quadraticCurveTo(-15, 5, -6, -10);
            ctx.closePath();
            ctx.fill();

            // Пояс
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(-9, 0, 18, 3);

            // Отрисовка рук
            ctx.fillStyle = '#fca5a5';
            if (this.panicTimer > 0) {
                let armSwing = Math.sin(frameCount * 0.5) * 15;
                ctx.save(); ctx.translate(-15, -5); ctx.rotate(-Math.PI/4 + armSwing*0.05); ctx.beginPath(); ctx.roundRect(-4, 0, 8, 18, 4); ctx.fill(); ctx.restore();
                ctx.save(); ctx.translate(15, -5); ctx.rotate(Math.PI/4 - armSwing*0.05); ctx.beginPath(); ctx.roundRect(-4, 0, 8, 18, 4); ctx.fill();
                
                if (equippedWand === 'magic_wand') {
                    ctx.fillStyle = '#451a03'; ctx.fillRect(-1, 10, 2, 15);
                    ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(0, 25, 3 + Math.sin(frameCount*0.2), 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            } else {
                ctx.beginPath(); ctx.roundRect(-18, -5 - swing, 6, 15, 3); ctx.fill();
                
                ctx.save();
                ctx.translate(12, -5 + swing);
                ctx.beginPath(); ctx.roundRect(0, 0, 6, 15, 3); ctx.fill();
                
                if (equippedWand === 'magic_wand') {
                    ctx.fillStyle = '#451a03'; ctx.fillRect(2, 5, 3, 18);
                    ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(3.5, 23, 3 + Math.sin(frameCount*0.2), 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }

            // Голова
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, -20, 18, 0, Math.PI * 2);
            ctx.clip();
            try {
                ctx.drawImage(headImg, -18, -38, 36, 36);
            } catch(e) {
                ctx.fillStyle = '#fca5a5';
                ctx.fill();
            }
            ctx.restore();

            ctx.restore();
        }
    }

    class Goose {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 25;
            this.baseSpeed = 2 + Math.random() * 0.5;
            this.timer = Math.random() * 100;
            this.name = gooseNames[Math.floor(Math.random() * gooseNames.length)];
            this.faceType = 0;
            this.weaponType = 'none';
            this.faceTimer = 0;
            this.weaponChangeTimer = 0;
            this.talkCooldown = Math.random() * 300;
            this.phraseTimer = Math.random() * 600;
            this.eggTimer = 1800 + Math.random() * 600;
            this.dashFrames = 0; 
            
            this.shotsToFire = 0;
            this.shootCooldown = 0;

            this.isDead = false;
            this.stunTimer = 0;
        }

        update() {
            if (this.isDead) { this.faceType = 4; return; }
            if (this.stunTimer > 0) { this.stunTimer--; return; }

            let dx = player.x - this.x;
            let dy = player.y - this.y;
            let dist = Math.hypot(dx, dy);

            let speed = this.baseSpeed + (level * 0.1);
            if (this.dashFrames > 0) {
                this.dashFrames--;
                speed *= 3.5; 
            }
            
            let moveX = (dx / dist) * speed;
            let moveY = (dy / dist) * speed;

            this.x += moveX;
            this.y += moveY;

            // Ограничение забором
            this.x = Math.max(WORLD_MIN_X + this.size, Math.min(WORLD_MAX_X - this.size, this.x));
            this.y = Math.max(WORLD_MIN_Y + this.size, Math.min(WORLD_MAX_Y - this.size, this.y));

            if (this.talkCooldown > 0) this.talkCooldown--;

            // Стрельба / Лассо
            if ((this.weaponType === 'pistol' || this.weaponType === 'rifle' || this.weaponType === 'lasso') && this.shotsToFire > 0) {
                this.shootCooldown--;
                if (this.shootCooldown <= 0) {
                    this.shootCooldown = (this.weaponType === 'rifle') ? 30 : 60;
                    this.shotsToFire--;
                    let angle = Math.atan2(player.y - this.y, player.x - this.x);
                    let isLasso = this.weaponType === 'lasso';
                    bullets.push({
                        x: this.x + Math.cos(angle)*15, 
                        y: this.y + Math.sin(angle)*15, 
                        vx: Math.cos(angle) * (isLasso ? 6 : 8), 
                        vy: Math.sin(angle) * (isLasso ? 6 : 8), 
                        life: isLasso ? 100 : 150,
                        type: isLasso ? 'lasso' : 'bullet'
                    });
                    addBubble(this, isLasso ? "Вжииих!" : "Бах!", '#fbbf24');
                }
            }

            // Ловушки
            this.eggTimer--;
            if (this.eggTimer <= 0) {
                this.eggTimer = 1800;
                traps.push({x: this.x, y: this.y, size: 10, active: true});
                addBubble(this, phrasesEggDrop[Math.floor(Math.random() * phrasesEggDrop.length)], '#fcd34d');
            }

            // Эмоции
            this.faceTimer--;
            if (this.faceTimer <= 0) {
                this.faceTimer = 600; 
                this.faceType = Math.floor(Math.random() * 10);
            }

            // Оружие
            this.weaponChangeTimer--;
            if (this.weaponChangeTimer <= 0) {
                this.weaponChangeTimer = 300 + Math.random() * 600;
                let weapons = ['none', 'none', 'knife', 'pistol', 'fork', 'rifle', 'pitchfork', 'lasso'];
                this.weaponType = weapons[Math.floor(Math.random() * weapons.length)];
                
                if (this.weaponType === 'pistol') {
                    this.shotsToFire = 3; 
                    this.shootCooldown = 30;
                } else if (this.weaponType === 'rifle') {
                    this.shotsToFire = 6; 
                    this.shootCooldown = 30;
                } else if (this.weaponType === 'pitchfork') {
                    this.dashFrames = 45; 
                } else if (this.weaponType === 'lasso') {
                    this.shotsToFire = 1; 
                    this.shootCooldown = 30;
                }

                if (this.weaponType !== 'none' && Math.random() < 0.5) {
                    let wphrases = weaponPhrases[this.weaponType];
                    addBubble(this, wphrases[Math.floor(Math.random() * wphrases.length)], '#ef4444');
                }
            }

            // Фразочки
            this.phraseTimer--;
            if (this.phraseTimer <= 0) {
                this.phraseTimer = 600; 
                addBubble(this, phrasesGoose[Math.floor(Math.random() * phrasesGoose.length)], '#fcd34d');
            }

            // Проверка поимки
            if (dist < this.size + player.size - 5) {
                triggerGameOver();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x - camera.x, this.y - camera.y);
            
            if (this.isDead) {
                ctx.rotate(Math.PI / 2);
            } else if (this.stunTimer > 0) {
                ctx.translate(Math.sin(frameCount) * 2, 0);
            }
            
            let wobble = (this.isDead || this.stunTimer > 0) ? 0 : Math.sin(frameCount * 0.2) * 5;
            
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath(); ctx.ellipse(0, 15, 15, 5, 0, 0, Math.PI*2); ctx.fill();

            if (player.x < this.x) {
                ctx.scale(-1, 1);
            }
            
            ctx.translate(0, wobble);
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(-5, 5, 18, 12, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#f3f4f6';
            ctx.beginPath(); ctx.ellipse(-8, 5, 10, 6, -Math.PI/6, 0, Math.PI*2); ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(-5, -5);
            ctx.quadraticCurveTo(10, -10, 8, -25);
            ctx.lineWidth = 6; ctx.strokeStyle = '#ffffff'; ctx.stroke();
            
            ctx.beginPath(); ctx.arc(8, -25, 8, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            if (this.faceType % 3 === 0) { 
                ctx.moveTo(15, -28); ctx.lineTo(25, -25); ctx.lineTo(15, -22);
            } else if (this.faceType % 3 === 1) { 
                ctx.moveTo(15, -28); ctx.lineTo(25, -28); ctx.lineTo(15, -22);
            } else { 
                ctx.moveTo(15, -26); ctx.lineTo(23, -24); ctx.lineTo(15, -22);
            }
            ctx.fill();
            
            ctx.fillStyle = '#000000';
            let eyeX = 10; let eyeY = -28;
            if (this.faceType === 0 || this.faceType === 1) { 
                ctx.beginPath(); ctx.arc(eyeX, eyeY, 2, 0, Math.PI*2); ctx.fill();
            } else if (this.faceType === 2) { 
                ctx.beginPath(); ctx.moveTo(eyeX-2, eyeY-2); ctx.lineTo(eyeX+2, eyeY); ctx.lineWidth=1.5; ctx.strokeStyle='#000'; ctx.stroke();
                ctx.beginPath(); ctx.arc(eyeX, eyeY+1, 1.5, 0, Math.PI*2); ctx.fill();
            } else if (this.faceType === 3) { 
                ctx.beginPath(); ctx.arc(eyeX, eyeY-1, 3, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(eyeX, eyeY-1, 1, 0, Math.PI*2); ctx.fill();
            } else if (this.faceType === 4) { 
                ctx.font = '8px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('x', eyeX, eyeY);
            } else if (this.faceType === 5) { 
                ctx.beginPath(); ctx.moveTo(eyeX-2, eyeY); ctx.lineTo(eyeX+2, eyeY-2); ctx.lineWidth=1.5; ctx.strokeStyle='#000'; ctx.stroke();
            } else if (this.faceType === 6) { 
                ctx.fillStyle = 'red'; ctx.font = '8px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('♥', eyeX, eyeY+2);
            } else if (this.faceType === 7) { 
                ctx.beginPath(); ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(eyeX-1, eyeY+1, 1, 0, Math.PI*2); ctx.fill();
            } else if (this.faceType === 8) { 
                ctx.beginPath(); ctx.moveTo(eyeX-2, eyeY); ctx.quadraticCurveTo(eyeX, eyeY+2, eyeX+2, eyeY); ctx.lineWidth=1; ctx.strokeStyle='#000'; ctx.stroke();
            } else { 
                ctx.fillRect(eyeX-1.5, eyeY-1.5, 3, 3);
            }

            if (this.weaponType !== 'none') {
                ctx.save();
                ctx.translate(12, 5);
                ctx.rotate(Math.sin(frameCount * 0.3) * 0.5); 
                
                if (this.weaponType === 'knife') {
                    ctx.fillStyle = '#78350f'; ctx.fillRect(-2, -2, 6, 4); 
                    ctx.fillStyle = '#d4d4d8'; ctx.fillRect(3, -4, 2, 8); 
                    ctx.fillStyle = '#9ca3af'; 
                    ctx.beginPath(); ctx.moveTo(5, -2); ctx.lineTo(15, -2); ctx.lineTo(18, 0); ctx.lineTo(15, 2); ctx.lineTo(5, 2); ctx.fill();
                    ctx.strokeStyle = '#f3f4f6'; ctx.beginPath(); ctx.moveTo(6, -1); ctx.lineTo(14, -1); ctx.stroke(); 
                } else if (this.weaponType === 'pistol') {
                    ctx.fillStyle = '#9ca3af'; ctx.fillRect(0, -3, 12, 4); 
                    ctx.fillStyle = '#1f2937'; ctx.fillRect(-2, -2, 5, 8); 
                    ctx.strokeStyle = '#1f2937'; ctx.strokeRect(3, 1, 4, 3); 
                } else if (this.weaponType === 'fork') {
                    ctx.strokeStyle = '#d4d4d8'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(6, 0); ctx.stroke(); 
                    ctx.beginPath(); ctx.moveTo(6, -3); ctx.lineTo(6, 3); ctx.stroke(); 
                    for(let py=-3; py<=3; py+=2) { 
                        ctx.beginPath(); ctx.moveTo(6, py); ctx.lineTo(12, py); ctx.stroke();
                    }
                } else if (this.weaponType === 'rifle') {
                    ctx.fillStyle = '#78350f'; ctx.fillRect(-8, -2, 8, 5); 
                    ctx.fillStyle = '#374151'; ctx.fillRect(0, -3, 8, 5); 
                    ctx.fillStyle = '#111827'; ctx.fillRect(8, -2, 12, 3); 
                    ctx.fillStyle = '#111827'; ctx.fillRect(2, -5, 6, 2); 
                    ctx.fillStyle = '#1f2937'; ctx.fillRect(2, 2, 4, 6); 
                } else if (this.weaponType === 'pitchfork') {
                    ctx.fillStyle = '#78350f'; ctx.fillRect(-10, -1, 20, 2); 
                    ctx.strokeStyle = '#d4d4d8'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(10, -4); ctx.lineTo(10, 4); ctx.stroke(); 
                    for(let py=-4; py<=4; py+=4) { 
                        ctx.beginPath(); ctx.moveTo(10, py); ctx.lineTo(16, py); ctx.stroke();
                    }
                } else if (this.weaponType === 'lasso') {
                    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.ellipse(5, 0, 8, 4, 0, 0, Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(5, -2, 7, 3, 0, 0, Math.PI*2); ctx.stroke();
                }
                ctx.restore();
            }

            ctx.restore();
        }
    }

    class Environment {
        static generateMap() {
            items = [];
            obstacles = [];
            traps = [];
            grasses = [];
            stones = [];
            
            for(let i=0; i<400; i++) {
                grasses.push({
                    x: WORLD_MIN_X + Math.random() * (WORLD_MAX_X - WORLD_MIN_X),
                    y: WORLD_MIN_Y + Math.random() * (WORLD_MAX_Y - WORLD_MIN_Y),
                    type: Math.floor(Math.random() * 3)
                });
                if(i % 4 === 0) {
                    stones.push({
                        x: WORLD_MIN_X + Math.random() * (WORLD_MAX_X - WORLD_MIN_X),
                        y: WORLD_MIN_Y + Math.random() * (WORLD_MAX_Y - WORLD_MIN_Y),
                        size: 3 + Math.random() * 5
                    });
                }
            }

            for(let i=0; i<5 + level*2; i++) {
                let nx = player.x + (Math.random() - 0.5) * 1500;
                let ny = player.y + (Math.random() - 0.5) * 1500;
                nx = Math.max(WORLD_MIN_X + 20, Math.min(WORLD_MAX_X - 20, nx));
                ny = Math.max(WORLD_MIN_Y + 20, Math.min(WORLD_MAX_Y - 20, ny));
                items.push({ x: nx, y: ny, size: 15 });
            }

            if (level >= 3) {
                let obsCount = level * 3;
                for(let i=0; i<obsCount; i++) {
                    let isWater = level >= 11 ? Math.random() > 0.5 : false;
                    obstacles.push({
                        type: isWater ? 'water' : 'bush',
                        x: WORLD_MIN_X + 100 + Math.random() * (WORLD_MAX_X - WORLD_MIN_X - 200),
                        y: WORLD_MIN_Y + 100 + Math.random() * (WORLD_MAX_Y - WORLD_MIN_Y - 200),
                        size: isWater ? 50 + Math.random()*50 : 30 + Math.random()*20
                    });
                }
            }
        }

        static drawFence() {
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(-10000, -10000, 10000 + WORLD_MIN_X, 20000); 
            ctx.fillRect(WORLD_MAX_X, -10000, 10000, 20000); 
            ctx.fillRect(WORLD_MIN_X, -10000, WORLD_MAX_X - WORLD_MIN_X, 10000 + WORLD_MIN_Y); 
            ctx.fillRect(WORLD_MIN_X, WORLD_MAX_Y, WORLD_MAX_X - WORLD_MIN_X, 10000); 

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.rect(WORLD_MIN_X, WORLD_MIN_Y, WORLD_MAX_X - WORLD_MIN_X, WORLD_MAX_Y - WORLD_MIN_Y);
            ctx.rect(WORLD_MIN_X - 10, WORLD_MIN_Y - 10, WORLD_MAX_X - WORLD_MIN_X + 20, WORLD_MAX_Y - WORLD_MIN_Y + 20);
            ctx.stroke();

            ctx.fillStyle = '#A0522D';
            const step = 150;
            for(let x = WORLD_MIN_X; x <= WORLD_MAX_X; x += step) {
                ctx.fillRect(x - 5, WORLD_MIN_Y - 15, 10, 25);
                ctx.fillRect(x - 5, WORLD_MAX_Y - 10, 10, 25);
            }
            for(let y = WORLD_MIN_Y; y <= WORLD_MAX_Y; y += step) {
                ctx.fillRect(WORLD_MIN_X - 15, y - 5, 25, 10);
                ctx.fillRect(WORLD_MAX_X - 10, y - 5, 25, 10);
            }

            ctx.restore();
        }

        static drawGround() {
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            grasses.forEach(g => {
                let gx = g.x - camera.x;
                let gy = g.y - camera.y;
                if(gx < -50 || gx > (w/ZOOM)+50 || gy < -50 || gy > (h/ZOOM)+50) return; 
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                if (g.type === 0) { ctx.lineTo(gx - 3, gy - 8); ctx.moveTo(gx, gy); ctx.lineTo(gx + 2, gy - 6); }
                else if (g.type === 1) { ctx.lineTo(gx + 4, gy - 7); }
                else { ctx.lineTo(gx - 2, gy - 5); ctx.moveTo(gx, gy); ctx.lineTo(gx + 3, gy - 7); ctx.moveTo(gx, gy); ctx.lineTo(gx, gy - 9); }
                ctx.stroke();
            });

            ctx.fillStyle = '#6b7280';
            stones.forEach(s => {
                let sx = s.x - camera.x;
                let sy = s.y - camera.y;
                if(sx < -50 || sx > (w/ZOOM)+50 || sy < -50 || sy > (h/ZOOM)+50) return;
                ctx.beginPath(); ctx.ellipse(sx, sy, s.size, s.size*0.7, 0, 0, Math.PI*2); ctx.fill();
            });
        }

        static drawItems() {
            items.forEach(item => {
                let ix = item.x - camera.x;
                let iy = item.y - camera.y;
                ctx.save();
                ctx.translate(ix, iy);
                ctx.fillStyle = '#111827'; 
                ctx.fillRect(-6, -10, 12, 18);
                ctx.fillStyle = '#ffffff'; 
                ctx.fillRect(-5, -5, 10, 10);
                ctx.fillStyle = '#000000'; 
                ctx.font = 'bold 6px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('JD', 0, 0);
                ctx.fillStyle = '#d97706'; 
                ctx.fillRect(-3, -16, 6, 6);
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(-3.5, -18, 7, 3);
                ctx.restore();
            });
        }

        static drawTraps() {
            traps.forEach(trap => {
                if(trap.active) {
                    ctx.font = '20px Arial';
                    ctx.fillText('🥚', trap.x - camera.x - 10, trap.y - camera.y + 10);
                } else {
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath(); ctx.arc(trap.x - camera.x, trap.y - camera.y, 15, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        static drawObstaclesBottom() {
            obstacles.filter(o => o.type === 'water').forEach(obs => {
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath();
                ctx.arc(obs.x - camera.x, obs.y - camera.y, obs.size, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        static drawObstaclesTop() {
            obstacles.filter(o => o.type === 'bush').forEach(obs => {
                ctx.fillStyle = '#166534';
                ctx.beginPath();
                ctx.arc(obs.x - camera.x, obs.y - camera.y, obs.size, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#14532d';
                ctx.beginPath(); ctx.arc(obs.x - camera.x - 10, obs.y - camera.y - 10, obs.size*0.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(obs.x - camera.x + 10, obs.y - camera.y + 5, obs.size*0.6, 0, Math.PI*2); ctx.fill();
            });
        }
    }

    // --- СИСТЕМА ДИАЛОГОВ И ЧАТА ---
    function addToChat(name, text, color) {
        const chat = document.getElementById('chatLog');
        const msg = document.createElement('div');
        msg.className = 'text-white text-sm font-bold p-1 px-2 rounded bg-black bg-opacity-60 transition-opacity duration-1000';
        msg.style.textShadow = '1px 1px 0 #000';
        msg.innerHTML = `<span style="color: ${color}">${name}:</span> ${text}`;
        chat.appendChild(msg);

        setTimeout(() => {
            msg.style.opacity = '0';
            setTimeout(() => msg.remove(), 1000);
        }, 8000);

        while (chat.children.length > 8) {
            chat.removeChild(chat.firstChild);
        }
    }

    function addBubble(entity, text, color = '#ffffff') {
        bubbles.push({
            entity: entity,
            text: text,
            life: 250,      
            maxLife: 250,
            color: color
        });
        
        let name = entity === player ? 'Яра' : entity.name;
        addToChat(name, text, color);
    }

    function drawBubbles() {
        for (let i = bubbles.length - 1; i >= 0; i--) {
            let b = bubbles[i];
            b.life--;
            if (b.life <= 0) {
                bubbles.splice(i, 1);
                continue;
            }

            let bx = b.entity.x - camera.x;
            let by = b.entity.y - (b.entity === player ? 50 : 40) - camera.y - (b.maxLife - b.life)*0.05;

            ctx.globalAlpha = b.life / 30 > 1 ? 1 : b.life / 30;
            
            ctx.fillStyle = b.color;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.font = 'bold 16px Arial';
            let tw = ctx.measureText(b.text).width;
            
            ctx.beginPath();
            ctx.roundRect(bx - tw/2 - 10, by - 25, tw + 20, 30, 10);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(bx - 5, by + 5);
            ctx.lineTo(bx, by + 15);
            ctx.lineTo(bx + 5, by + 5);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(b.text, bx, by - 10);
            
            ctx.globalAlpha = 1;
        }
    }

    // --- ЧАСТИЦЫ ---
    function createParticles(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 20 + Math.random() * 20,
                color: color
            });
        }
    }
    
    function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if(p.life <= 0) { particles.splice(i, 1); continue; }
            
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 40;
            ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, 3, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    // --- УПРАВЛЕНИЕ УКАЗАТЕЛЕМ (Палец/Мышь) ---
    function updatePointer(e) {
        if (gameState !== 'playing') return;
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        if (clientX === undefined || clientY === undefined) return;

        pointer.x = clientX / ZOOM;
        pointer.y = clientY / ZOOM;
    }
    
    window.addEventListener('mousedown', (e) => {
        if (e.target.closest('#joystick-zone') || e.target.closest('.btn')) return;
        pointerActive = true;
        updatePointer(e);
    });
    window.addEventListener('mousemove', (e) => {
        if (pointerActive) updatePointer(e);
    });
    window.addEventListener('mouseup', () => pointerActive = false);

    window.addEventListener('touchstart', (e) => {
        if (e.target.closest('#joystick-zone') || e.target.closest('.btn')) return;
        pointerActive = true;
        updatePointer(e);
    }, {passive: false});
    window.addEventListener('touchmove', (e) => {
        if (pointerActive) updatePointer(e);
    }, {passive: false});
    window.addEventListener('touchend', () => pointerActive = false);

    // --- ЛОГИКА ДЖОЙСТИКА ---
    const joyZone = document.getElementById('joystick-zone');
    const joyKnob = document.getElementById('joystick-knob');

    function handleJoyStart(e) {
        if (gameState !== 'playing') return;
        joyActive = true;
        handleJoyMove(e);
    }

    function handleJoyMove(e) {
        if (!joyActive) return;
        if (e.cancelable) e.preventDefault(); 
        
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        if (clientX === undefined || clientY === undefined) return;
        
        let rect = joyZone.getBoundingClientRect();
        let centerX = rect.left + rect.width / 2;
        let centerY = rect.top + rect.height / 2;
        
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        let dist = Math.hypot(dx, dy);
        let maxDist = rect.width / 2 - 25; 
        
        if (dist > maxDist) {
            dx = (dx / dist) * maxDist;
            dy = (dy / dist) * maxDist;
        }
        
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        
        joyData.x = dx / maxDist;
        joyData.y = dy / maxDist;
    }

    function handleJoyEnd(e) {
        joyActive = false;
        joyData = { x: 0, y: 0 };
        joyKnob.style.transform = `translate(-50%, -50%)`;
    }

    joyZone.addEventListener('mousedown', handleJoyStart);
    document.addEventListener('mousemove', handleJoyMove);
    document.addEventListener('mouseup', handleJoyEnd);
    
    joyZone.addEventListener('touchstart', handleJoyStart, {passive: false});
    document.addEventListener('touchmove', handleJoyMove, {passive: false});
    document.addEventListener('touchend', handleJoyEnd);

    // --- ИГРОВОЙ ЦИКЛ ---
    function startGame() {
        gameState = 'playing';
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        level = 1;
        bottlesCollectedThisRound = 0;
        updateHUD();

        player = new Player();
        pointer = { x: w/2, y: h/2 };
        geese = [new Goose(600, 600)]; 
        bubbles = [];
        particles = [];
        bullets = [];
        document.getElementById('chatLog').innerHTML = ''; 
        
        Environment.generateMap();

        introTimer = 180;
        introText = `Вас преследует Гусь ${geese[0].name}`;
    }

    function triggerGameOver() {
        gameState = 'gameover';
        globalBottles += bottlesCollectedThisRound;
        localStorage.setItem('yara_bottles', globalBottles);
        
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.remove('hidden');
        document.getElementById('roundBottles').innerText = bottlesCollectedThisRound;
        updateMenuStats();
        
        joyActive = false;
        pointerActive = false;
        joyData = { x: 0, y: 0 };
        joyKnob.style.transform = `translate(-50%, -50%)`;
    }

    function spawnGeese() {
        let targetGeese = 1 + Math.floor(level / 3);
        if (level >= 11) targetGeese = 4; 

        while (geese.length < targetGeese) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.max(w, h) / ZOOM;
            geese.push(new Goose(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
        }
    }

    function update() {
        if (gameState !== 'playing') return;
        frameCount++;

        player.update();
        geese.forEach(goose => goose.update());
        spawnGeese();

        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            
            if (item.isAccio) {
                let dx = player.x - item.x;
                let dy = player.y - item.y;
                let d = Math.hypot(dx, dy);
                if (d > 5) {
                    item.x += (dx / d) * 12;
                    item.y += (dy / d) * 12;
                }
            }
            
            if (Math.hypot(player.x - item.x, player.y - item.y) < player.size + item.size) {
                items.splice(i, 1);
                bottlesCollectedThisRound++;
                player.drunkLevel += 1;
                createParticles(item.x, item.y, '#f59e0b');
                
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.max(w, h) / ZOOM / 2 + 150 + Math.random() * 300;
                let nx = player.x + Math.cos(angle) * dist;
                let ny = player.y + Math.sin(angle) * dist;
                
                nx = Math.max(WORLD_MIN_X + 20, Math.min(WORLD_MAX_X - 20, nx));
                ny = Math.max(WORLD_MIN_Y + 20, Math.min(WORLD_MAX_Y - 20, ny));
                items.push({ x: nx, y: ny, size: 15 });
                
                if (Math.random() < 0.3) {
                    addBubble(player, phrasesCollect[Math.floor(Math.random() * phrasesCollect.length)], '#ffffff');
                }

                updateHUD();

                if (bottlesCollectedThisRound > 0 && bottlesCollectedThisRound % 10 === 0) {
                    level++;
                    player.drunkLevel = 0; 
                    updateHUD();
                    Environment.generateMap(); 
                    
                    introTimer = 180;
                    introText = `Уровень ${level}! Яра протрезвела!`;
                    addBubble(player, "Ух, отпустило! Идём дальше!", '#a78bfa');
                } 
                else if (bottlesCollectedThisRound % 5 === 0) {
                    player.fallenTimer = 60; 
                    let fallPhrase = phrasesFall[Math.floor(Math.random() * phrasesFall.length)];
                    addBubble(player, fallPhrase, '#fca5a5');
                }
            }
        }

        traps.forEach(trap => {
            if (trap.active && Math.hypot(player.x - trap.x, player.y - trap.y) < player.size + trap.size) {
                trap.active = false;
                player.fallenTimer = 60;
                createParticles(trap.x, trap.y, '#fef08a');
                addBubble(player, phrasesEggStep[Math.floor(Math.random() * phrasesEggStep.length)], '#fca5a5');
            }
        });

        for (let i = 0; i < geese.length; i++) {
            for (let j = i + 1; j < geese.length; j++) {
                let g1 = geese[i];
                let g2 = geese[j];
                if (g1.isDead || g2.isDead) continue; 
                if (g1.talkCooldown <= 0 && g2.talkCooldown <= 0 && Math.hypot(g1.x - g2.x, g1.y - g2.y) < 100) {
                    addBubble(g1, `Привет, ${g2.name}!`, '#6ee7b7');
                    addBubble(g2, `Здарова, ${g1.name}!`, '#6ee7b7');
                    g1.talkCooldown = 300 + Math.random()*300;
                    g2.talkCooldown = 300 + Math.random()*300;
                }
            }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            
            if (Math.hypot(player.x - b.x, player.y - b.y) < player.size + 5) {
                if (b.type === 'lasso') {
                    player.fallenTimer = 60; 
                    addBubble(player, phrasesLassoHit[Math.floor(Math.random() * phrasesLassoHit.length)], '#fca5a5');
                } else {
                    triggerGameOver();
                }
                bullets.splice(i, 1);
                continue;
            }

            if (b.life <= 0) bullets.splice(i, 1);
        }
    }

    function draw() {
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(0, 0, w, h);

        if (gameState !== 'playing') return;

        ctx.save();
        ctx.scale(ZOOM, ZOOM);

        ctx.save();
        ctx.translate(-camera.x % 100, -camera.y % 100);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 2;
        for(let i=-100; i< (w/ZOOM) +100; i+=100) {
            ctx.beginPath(); ctx.moveTo(i, -100); ctx.lineTo(i, (h/ZOOM)+100); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-100, i); ctx.lineTo((w/ZOOM)+100, i); ctx.stroke();
        }
        ctx.restore();

        Environment.drawGround(); 
        Environment.drawFence(); 
        Environment.drawObstaclesBottom();
        Environment.drawTraps();
        Environment.drawItems();
        
        let entities = [{obj: player, type: 'player'}, ...geese.map(g => ({obj: g, type: 'goose'}))];
        entities.sort((a, b) => a.obj.y - b.obj.y);
        
        entities.forEach(ent => {
            if(ent.type === 'player') ent.obj.draw();
            else ent.obj.draw();
        });

        bullets.forEach(b => {
            if (b.type === 'lasso') {
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(b.x - camera.x, b.y - camera.y, 12, 6, frameCount * 0.2, 0, Math.PI*2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(b.x - camera.x, b.y - camera.y);
                ctx.lineTo(b.x - b.vx*4 - camera.x, b.y - b.vy*4 - camera.y);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#fef08a'; 
                ctx.beginPath(); 
                ctx.arc(b.x - camera.x, b.y - camera.y, 4, 0, Math.PI*2); 
                ctx.fill();
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(b.x - b.vx - camera.x, b.y - b.vy - camera.y, 2, 0, Math.PI*2);
                ctx.fill();
            }
        });

        Environment.drawObstaclesTop(); 
        drawParticles();
        drawBubbles();
        
        ctx.restore(); 

        if (introTimer > 0) {
            introTimer--;
            ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(introTimer / 30, 0.5)})`;
            ctx.fillRect(0, h/2 - 50, w, 100);
            ctx.fillStyle = `rgba(255, 200, 0, ${Math.min(introTimer / 30, 1)})`;
            ctx.font = 'bold 35px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(introText, w/2, h/2);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.strokeText(introText, w/2, h/2);
        }

        if (player && player.drunkLevel > 0) {
            let opacity = Math.min(player.drunkLevel * 0.02, 0.4);
            ctx.fillStyle = `rgba(139, 92, 246, ${opacity})`;
            ctx.fillRect(0, 0, w, h);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // --- МАГАЗИН И UI ---
    function updateHUD() {
        document.getElementById('uiLevel').innerText = level;
        document.getElementById('uiBottles').innerText = bottlesCollectedThisRound;
    }

    function updateMenuStats() {
        document.getElementById('menuBottles').innerText = globalBottles;
        document.getElementById('shopBottles').innerText = globalBottles;
    }

    function openShopFromGameOver() {
        document.getElementById('gameOverScreen').classList.add('hidden');
        openShop();
    }

    function openShop() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('shopScreen').classList.remove('hidden');
        renderShop();
    }

    function closeShop() {
        document.getElementById('shopScreen').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
    }

    function buyOrEquip(id) {
        let item = shopItems.find(i => i.id === id);
        
        if (!inventory.includes(id)) {
            if (globalBottles >= item.cost) {
                globalBottles -= item.cost;
                inventory.push(id);
                localStorage.setItem('yara_bottles', globalBottles);
                localStorage.setItem('yara_inventory', JSON.stringify(inventory));
                updateMenuStats();
            } else {
                alert("Не хватает 🥃!");
                return;
            }
        }
        
        if (inventory.includes(id)) {
            if (item.type === 'skin') {
                equippedSkin = id;
                localStorage.setItem('yara_equippedSkin', id);
            } else if (item.type === 'vehicle') {
                equippedVehicle = equippedVehicle === id ? 'none' : id; 
                localStorage.setItem('yara_equippedVehicle', equippedVehicle);
            } else if (item.type === 'wand') {
                equippedWand = equippedWand === id ? 'none' : id; 
                localStorage.setItem('yara_equippedWand', equippedWand);
            }
        }
        renderShop();
    }

    function renderShop() {
        const container = document.getElementById('shopContainer');
        container.innerHTML = '';
        
        shopItems.forEach(item => {
            const hasItem = inventory.includes(item.id);
            const isEquipped = equippedSkin === item.id || equippedVehicle === item.id || equippedWand === item.id;
            
            let btnText = "Купить 🥃" + item.cost;
            let btnClass = "buy-btn bg-green-500";
            
            if (hasItem) {
                btnText = isEquipped ? "СНЯТЬ" : "НАДЕТЬ";
                btnClass = isEquipped ? "buy-btn bg-red-500" : "buy-btn bg-blue-500";
            }

            const div = document.createElement('div');
            div.className = 'shop-item';
            
            let iconHtml = '';
            if(item.type === 'skin') {
                iconHtml = `<div style="width: 40px; height: 40px; background-color: ${item.color}; margin: 0 auto; border-radius: 5px; border: 2px solid #000;"></div>`;
            } else if (item.type === 'wand') {
                iconHtml = `<div style="font-size: 30px;">🪄</div>`;
            } else {
                iconHtml = `<div style="font-size: 30px;">${item.id === 'bike' ? '🚲' : '🛼'}</div>`;
            }

            div.innerHTML = `
                ${iconHtml}
                <div class="font-bold mt-2">${item.name}</div>
                <div class="text-xs text-gray-600 h-8">${item.desc}</div>
                <button class="${btnClass}" onclick="buyOrEquip('${item.id}')" ${!hasItem && globalBottles < item.cost ? 'disabled' : ''}>
                    ${btnText}
                </button>
            `;
            container.appendChild(div);
        });
    }

    updateMenuStats();
    requestAnimationFrame(loop);

</script>
